apiVersion: apps/v1
kind: Deployment
metadata:
  name: tier-app
  namespace: qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tier-app
  template:
    metadata:
      labels:
        app: tier-app
    spec:
      imagePullSecrets:
      - name: tier-app-reg-secret
      containers:
      - name: tier-app
        image: iamridoydey/3-tier-app:95211936201b5c677f281371b749a2582a5dfa48
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        env:
        - name: DB_HOST
          value: mysql
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_DATABASE
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DATABASE_URL
