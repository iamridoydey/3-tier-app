name: Production cd pipeline
on:
  push:
    branches:
      - main 
    paths:
      - k8-manifests/prod/app-deployment.yaml
      - .github/workflows/prod.yml
permissions:
  contents: write
  id-token: write
jobs:
  promote-image-to-prod:
    name: Pull the image from the dockerhub and re-tag it
    runs-on: ubuntu-latest
    env:
      QA_IMAGE: iamridoydey/3-tier-app:latest
      LATEST_IMAGE: iamridoydey/3-tier-app:prod-${{ github.sha }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Pull QA latest image
        run: docker pull "${QA_IMAGE}"
        
      - name: Retag docker image
        run: |
          docker tag "${QA_IMAGE}" "${LATEST_IMAGE}"
      - name: Push the prod image to the dockerhub
        run: |
          docker push "${LATEST_IMAGE}"

  update-prod-manifests:
    name: Update qa manifests
    runs-on: ubuntu-latest
    needs: promote-image-to-prod
    permissions:
      contents: write
      id-token: write
      
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: iamridoydey/3-tier-app:.*|image: iamridoydey/3-tier-app:${GITHUB_SHA}|g" k8s-manifests/prod/app-deployment.yaml
      - name: Show updated manifest
        run: |
          cat k8s-manifests/prod/app-deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s-manifests/prod/app-deployment.yaml
          git commit -m "Update PROD image to ${GITHUB_SHA} [skip ci]" || echo "No changes to commit"

  deploy-to-k8s:
    name: Deploy to k8s
    runs-on: ubuntu-latest
    needs: update-prod-manifests
    permissions:
      id-token: write
    env:
      AWS_REGION: us-east-1
      AWS_CLUSTER_NAME: app-cluster
      k8s_NAMESPACE: prod
      
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: qa

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
          
      - name: Generate the kubeconfig
        run: aws eks update-kubeconfig --name=${{ env.AWS_CLUSTER_NAME }} --region=${{ env.AWS_REGION }}

      - name: Verify the identity
        run: |
          aws sts get-caller-identity
          kubectl config current-context

      - name: Verify the namespace access
        run: |
          kubectl get pods -n ${{ env.k8s_NAMESPACE }}
          kubectl get services -n ${{ env.k8s_NAMESPACE }}
          kubectl auth can-i create deploy -n ${{ env.k8s_NAMESPACE }}
          kubectl auth can-i create svc -n ${{ env.k8s_NAMESPACE }}
          kubectl auth can-i create ingress -n ${{ env.k8s_NAMESPACE }}

      - name: Deploy app manifests to the k8s cluster
        run: |
          kubectl apply -f k8s-manifests/prod/ -n ${{ env.k8s_NAMESPACE }}
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/tier-app -n ${{ env.k8s_NAMESPACE }} --timeout=180s
