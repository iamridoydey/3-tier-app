name: QA Pipeline
on:
  push:
    branches: 
      - qa
    paths:
      - client/**
      - server/**
      - .github/workflows/qa.yml
      
jobs:
  gitleaks-scan:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
      - name: Run gitleaks scan
        run: |
          docker run --rm \
          -v "${{ github.workspace }}:/repo" \
          zricethezav/gitleaks:latest detect \
          --source=/repo \
          --report-format=json \
          --report-path=/repo/gitleaks-report.json \
          --redact \
          --exit-code 0
          
      - name: Upload gitleaks artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: ${{ github.workspace }}/gitleaks-report.json
          if-no-files-found: warn 

  checkov-tf-scan:
    name: Checkov-tf-scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install checkov
        run: pip install checkov
      - name: Checkov tf scan
        run: |
          checkov -d . \
          --framework terraform \
          --output json > checkov-terraform-report.json || true
        
      - name: Upload checkov terraform artifact
        uses: actions/upload-artifact@v7
        with:
          name: checkov-terraform-scan-report
          path: ${{ github.workspace }}/checkov-terraform-report.json
          if-no-files-found: warn 
          
  checkov-k8s-scan:
    name: Checkov-k8s-scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install checkov
        run: pip install checkov
      - name: Checkov k8s scan
        run: |
          checkov -d . \
          --framework kubernetes \
          --output json > checkov-k8s-report.json || true
        
      - name: Upload checkov k8s artifact
        uses: actions/upload-artifact@v7
        with:
          name: checkov-k8s-scan-report
          path: ${{ github.workspace }}/checkov-k8s-report.json
          if-no-files-found: warn
  checkov-docker-scan:
    name: Checkov-dockerfile-scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install checkov
        run: pip install checkov
      - name: Checkov dockerfile scan
        run: |
          checkov -d . \
          --framework dockerfile \
          --output json > checkov-dockerfile-report.json || true
        
      - name: Upload checkov dockerfile artifact
        uses: actions/upload-artifact@v7
        with:
          name: checkov-dockerfile-scan-report
          path: ${{ github.workspace }}/checkov-dockerfile-report.json
          if-no-files-found: warn
      
          
  
          
        
